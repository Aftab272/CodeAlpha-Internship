<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Taskify - A premium, beautiful to-do list application for managing your daily tasks.">
    <title>Taskify - Premium Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="container">
        <header>
            <h1>Taskify</h1>
            <p>Manage your day with elegance.</p>
        </header>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
            <button type="submit" id="add-btn">
                <i class="fa-solid fa-plus"></i> Add
            </button>
        </form>

        <div class="filter-tabs" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="task-list">
            <!-- Tasks will be injected here via JavaScript -->
        </ul>
        
        <div class="footer">
            <p id="task-count">0 tasks left</p>
            <button id="clear-completed">Clear Completed</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
